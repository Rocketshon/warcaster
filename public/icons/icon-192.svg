<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="24" fill="#000000"/>
  <rect x="4" y="4" width="184" height="184" rx="20" fill="none" stroke="#10b981" stroke-width="2" opacity="0.4"/>
  <!-- Skull shape (simplified Warhammer aesthetic) -->
  <g transform="translate(96, 80)" fill="#10b981">
    <!-- Skull top -->
    <ellipse cx="0" cy="-8" rx="32" ry="28" fill="#10b981" opacity="0.9"/>
    <!-- Eye sockets -->
    <ellipse cx="-12" cy="-12" rx="8" ry="9" fill="#000000"/>
    <ellipse cx="12" cy="-12" rx="8" ry="9" fill="#000000"/>
    <!-- Eye glow -->
    <ellipse cx="-12" cy="-12" rx="4" ry="5" fill="#10b981" opacity="0.3"/>
    <ellipse cx="12" cy="-12" rx="4" ry="5" fill="#10b981" opacity="0.3"/>
    <!-- Nose -->
    <path d="M-4 0 L0 6 L4 0 Z" fill="#000000"/>
    <!-- Jaw -->
    <rect x="-22" y="8" width="44" height="14" rx="4" fill="#10b981" opacity="0.8"/>
    <!-- Teeth -->
    <rect x="-16" y="8" width="4" height="6" rx="1" fill="#000000"/>
    <rect x="-8" y="8" width="4" height="6" rx="1" fill="#000000"/>
    <rect x="0" y="8" width="4" height="6" rx="1" fill="#000000"/>
    <rect x="8" y="8" width="4" height="6" rx="1" fill="#000000"/>
    <!-- Laurel wreath left -->
    <path d="M-36 -20 Q-40 -35 -30 -40 Q-28 -30 -34 -22" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
    <path d="M-38 -10 Q-45 -22 -36 -30 Q-32 -20 -36 -12" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
    <!-- Laurel wreath right -->
    <path d="M36 -20 Q40 -35 30 -40 Q28 -30 34 -22" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
    <path d="M38 -10 Q45 -22 36 -30 Q32 -20 36 -12" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="96" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="16" fill="#10b981" letter-spacing="3">CRUSADE</text>
  <text x="96" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#10b981" opacity="0.6" letter-spacing="5">COMMAND</text>
  <!-- Corner accents -->
  <path d="M8 24 L8 8 L24 8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <path d="M168 8 L184 8 L184 24" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <path d="M8 168 L8 184 L24 184" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <path d="M168 184 L184 184 L184 168" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
</svg>
