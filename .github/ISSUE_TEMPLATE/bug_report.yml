---
name: Bug Report
description: Report a bug in the army builder or battle aid
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Army List Builder
        - Points Validation
        - Phase Navigator
        - Codex Browser
        - UI / Layout
        - Data / Stats
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened
  - type: input
    id: faction
    attributes:
      label: Faction (if relevant)
      placeholder: e.g., Space Marines, Orks, Necrons
