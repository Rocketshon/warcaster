---
name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What type of feature?
      options:
        - New faction / codex support
        - Army list improvement
        - Battle aid / phase navigator
        - Points calculation
        - UI / UX improvement
        - Data export / import
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      placeholder: How does this help with list building or gameplay?
